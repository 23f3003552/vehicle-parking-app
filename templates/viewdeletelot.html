<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />

    <!-- Your overrides -->
    <link rel="stylesheet" href="../static/adash.css" />

    <title>Edit Parking Lot</title>
  </head>
  <body>
    <nav class="navbar nav navbar-dark bg-dark">
      <div class="px-4">
        <h2 class="text-white m-0">LotBuddy</h2>
      </div>
    </nav>

    <div id="main">
      <div id="canvas">
        <div id="formBody1" class="box">
          <h2 class="text-white m-0 text-center">view Parking Spot!</h2>

          <div class="container py-4">
            <form
              action="{{ url_for('adash.editlot') }}"
              method="post"
              class="mx-auto"
              style="max-width: 700px"
            >
              <div class="row mb-3 align-items-center">
                <label for="spotid" class="col-sm-4 col-form-label"
                  >Spot ID</label
                >
                <div class="col-sm-8">
                  <input
                    type="text"
                    style="font-size: 20px"
                    name="spot_id"
                    id="spot_id"
                    class="form-control"
                    value="1"
                  />
                </div>
              </div>
              <div class="row mb-3 align-items-center">
                <label for="spotstatus" class="col-sm-4 col-form-label"
                  >STATUS</label
                >
                <div class="col-sm-8">
                  <a href="#" class="btn btn-ligth" id="spotstatus">O/A</a>
                </div>
              </div>
              <div class="text-center btn-container">
                <button
                  type="submit"
                  class="btn btn-dark"
                  style="margin-reight: 50px"
                >
                  Close
                </button>
                <a href="#" class="btn btn-danger">Delete</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
