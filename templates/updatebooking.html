<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />

  
    <link rel="stylesheet" href="{{ url_for('static', filename='css/adash.css') }}">

    <title>Release Parking</title>
  </head>
  <body>
  
    <!-- Header -->
    <nav class="navbar navbar-dark tt bg-dark">
      <div class="container-fluid px-4">
        <h3 class="text-white text-center m-0">LotBuddy</h3>
      </div>
    </nav>


    <!-- Form -->
    <div id="main">
      <div id="canvas">
        <div id="formBody" class="box">
           <h2 class="text-white m-0 text-center">Release The Parking Spot!</h2>
      
          <div class="container py-4">
            <form
              action="{{url_for('updatebooking',b_id=b.b_id,username=username)}}"
              method="POST"
              class="mx-auto"
              style="max-width: 700px"
            >
              <div class="row mb-3 align-items-center">
                <label for="lot_name" class="col-sm-4 col-form-label"
                  >SPOT ID: </label
                >
                <div class="col-sm-8">
                  <input
                    type="text"
                    name="spot_id"
                    id="spotid"
                    class="form-control"
                    value="{{b.spot_id}}"
                    readonly
                  />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <label for="address" class="col-sm-4 col-form-label"
                  >Vehicle number: </label
                >
                <div class="col-sm-8">
                  <input
                    type="text"
                    name="lotID"
                    id="address"
                    class="form-control"
                    value="{{b.veh_no}}"
                    readonly
                  />
                </div>
              </div>


              

              <div class="row mb-3 align-items-center">
                <label for="price" class="col-sm-4 col-form-label"
                  >user ID:</label
                >
                <div class="col-sm-8">
                  <input
                    type="text"
                    name="u_id"
                    value="{{b.u_id}}"
                    class="form-control"
                   
                   readonly
                    required
                  />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <label for="maxspot" class="col-sm-4 col-form-label"
                  >Total cost</label
                >
                <div class="col-sm-8">
                  <input
                    type="text"
                    name="total_amount"
                    id="maxspot"
                    class="form-control"
                    value="{{b.total_amount}}"
                    required
                    readonly
                  />
                </div>
              </div>

              <div class="text-center">
                <br>
                <button type="submit"  class="btn btn-dark" onclick="this.disabled=true; this.form.submit();">Update</button> 
               <!--
                <a href="{{url_for("userdash",username=username,booking=booking)}}" class="btn btn-danger" onclick="return confirm('Are you sure you want to cancel update?')">Cancel</a>
              -->
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
