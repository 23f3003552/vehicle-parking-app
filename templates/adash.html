<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/dashboard.css') }}"
    />

    <title>Admin Dashboard</title>
  </head>

  <body class="bg-light">
    
    <!-- Header -->
    <nav class="navbar navbar-dark tt bg-dark">
      <div class="container-fluid px-4">
        <h3 class="text-white text-center m-0">LotBuddy 

</h3>
      </div>
    </nav>


    <nav class="nav navbar px-4 bg-dark">
      <a
        class="nav-link active text-white"
        aria-current="page"
        href=""
        >Welcome Admin!</a>
      
      <a class="nav-link text-white" href="/adash">Home</a>
      <a class="nav-link text-white" href="/viewusers">Users</a>
      <a class="nav-link text-white" href="/asummary">Summary</a>
      <a class="nav-link d-flex ms-auto text-white" href="/login">Logout</a>
    </nav>

    <br /><br />

    <nav class="navbar navbar-dark bg-dark">
      <div class="w-100 text-center">
        <h2 class="text-white m-0">Parking Lots</h2>
      </div>
    </nav>

    <div class="container my-4">
      <div class="row row-cols-3 g-4">
        {% for lot in lots %}

        <div class="col-md-4">
          <div class="card text-center">
            <div class="card-header text-dark">
              <h3>{{ lot.lot_name }}</h3>
            </div>

            <div class="card-body d-felx ">
              <!-- Change these href/action values to your real endpoints -->
               <div class=" gap-3">
              <a href="{{url_for('editlot',lot_id=lot.lot_id)}}" class="text-dark d-inline">Edit </a> 
              <form method="post" action="{{url_for("deletelot",lot_id=lot.lot_id)}}" class="d-inline" onsubmit="return confirm('you sure')">
                <button
                  class="btn btn-link text-danger" type="submit"> Delete
                </button>
              </form>
            </div>  
              <p class="mb-2">Occupied: {{ lot.occ_cnt }}/{{ lot.tspot }}</p>

              <div class="d-grid gap-2">
                <div class="row g-1">
                

                  <!-- Parking Slots -->
                  {% for spot in lot.spots %}
                  <div class="col-3">
                    
    <a href="{{url_for('viewdeletespot',spot_id=spot.spot_id)}}" class="text-decoration-none">
                    <button 
                      class="btn btn-sm w-100 {{ 'btn-outline-success' if spot.is_available else 'btn-outline-danger' }}"
                      title="{{ 'Available' if spot.is_available else 'Occupied' }}"
                    >
                      {{ 'A' if spot.is_available else 'O' }}
                    </button>
                  </a>
                  </div>
                  {% endfor %}
                </div>
              </div>
              
            </div>
          </div>
        </div>
        {% else %}
        <div class="col-12 text-center">
          <p class="text-muted">No parking lots yet.</p>
        </div>
        {% endfor %}
      </div>

      <!-- Add Lot Button -->
      <div class="text-center my-4">
        <!-- Change href to your create-lot route -->
        <a href="/addlot" class="btn btn-outline-light bg-dark btn-lg">+ Add Lot</a>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
