<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />

    <!-- Your overrides -->
    <link rel="stylesheet" href="../static/css/adash.css" />

    <title>View Parking Spot</title>
  </head>
  <body>
    <nav class="navbar nav navbar-dark bg-dark">
      <div class="px-4">
        <h2 class="text-white m-0">LotBuddy</h2>
      </div>
    </nav>

    <div id="main">
      <div id="canvas">
        <div id="formBody2" class="box"><br>
            <h2 class="text-white m-0 text-center">View Parking Spot !</h2>
           <br>
        <form
              action=""
              method="post"
              class="mx-auto"
              style="max-width: 700px"
            >
              <div class="row mb-3 align-items-center">
                <label for="spotID" class="col-sm-4 col-form-label"
                  >Spot ID  :</label
                >
                <div class="col-sm-8">
                  <input
                    type="text"
                    name="spot_id"
                    id="lot_name"
                    class="form-control"
                    value="{{spot.spot_id}}"
                    readonly
                  />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
  <label for="customerID" class="col-sm-4 col-form-label">Status:</label>
  <div class="col-sm-8">
    {% if not spot.is_available %}
      <a href="{{ url_for('spotdetail', spot_id=spot.spot_id) }}">
        <input
          type="text"
          name="is_available"
          id="customerID"
          class="form-control text-danger"
          value="Occupied"
          readonly
        />
      </a>
    {% else %}
      <input
        type="text"
        name="is_available"
        id="customerID"
        class="form-control text-success"
        value="Available"
        
      />
    {% endif %}
  </div>
</div>

              <br>
               <div class="text-center">
                <a href="/adash" class="btn btn-dark">Close</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
