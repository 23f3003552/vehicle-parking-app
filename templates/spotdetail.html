<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />

    <!-- Your overrides -->
    <link rel="stylesheet" href="../static/adash.css" />

    <title>Edit Parking Lot</title>
  </head>
  <body>
    <nav class="navbar nav navbar-dark bg-dark">
      <div class="px-4">
        <h2 class="text-white m-0">LotBuddy</h2>
      </div>
    </nav>

    <div id="main">
      <div id="canvas">
        <div id="formBody2" class="box">
            <h2 class="text-white m-0 text-center">Occupied Parking Spot Detail!</h2>
           <br>
        <form
              action="{{ url_for('adash.newlot') }}"
              method="post"
              class="mx-auto"
              style="max-width: 700px"
            >
              <div class="row mb-3 align-items-center">
                <label for="spotID" class="col-sm-4 col-form-label"
                  >Spot ID  :</label
                >
                <div class="col-sm-8">
                  <input
                    type="text"
                    name="lot_name"
                    id="lot_name"
                    class="form-control"
                    value="1"
                  />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <label for="customerID" class="col-sm-4 col-form-label"
                  >User ID :</label
                >
                <div class="col-sm-8">
                  <input
                    type="text"
                    name="customerID"
                    id="customerID"
                    class="form-control"
                    required
                  />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <label for="state" class="col-sm-4 col-form-label">Date:</label>
                <div class="col-sm-8">
                  <input
                    type="date"
                    name="state"
                    id="state"
                    class="form-control"
                    value="xxx"
                  />
                </div>
              </div>

             

              <div class="row mb-3 align-items-center">
                <label for="price" class="col-sm-4 col-form-label"
                  >Cost:</label
                >
                <div class="col-sm-8">
                  <input
                    type="text"
                    name="price"
                    id="price"
                    class="form-control"
                    step="0.01"
                    min="0"
                    value="xxx"
                  />
                </div>
              </div>

              
               
            

              <div class="text-center">
                <a href="#" class="btn btn-dark">Close</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
