<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />

   
    <link rel="stylesheet" href="../static/css/adash.css" />

    <title>Edit Parking Lot</title>
  </head>
  <body>
 
    <nav class="navbar nav navbar-dark bg-dark">
      <div class="px-4">
        <h2 class="text-white m-0 ">LotBuddy</h2>
      </div>
    </nav>
    
    
    <div id="main">
      <div id="canvas">
        <div id="formBody" class="box">
           <h2 class="text-white m-0 text-center">Edit Parking Lot!</h2>
      
          <div class="container py-4">
            <form
              action="{{ url_for('editlot',lot_id=lot.lot_id) }}"
              method="post"
              class="mx-auto"
              style="max-width: 700px"
            >
              <div class="row mb-3 align-items-center">
                <label for="lot_name" class="col-sm-4 col-form-label"
                  >Prime Location</label
                >
                <div class="col-sm-8">
                  <input
                    type="text"
                    style="font-size: 20px"
                    name="lotname"
                    id="lot_name"
                    class="form-control"
                    value="{{lot.lot_name}}"
                  />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <label for="address" class="col-sm-4 col-form-label"
                  >Address</label
                >
                <div class="col-sm-8">
                  <input
                    type="text"
                    style="font-size: 20px"
                    name="address"
                    id="address"
                    class="form-control"
                    Value="{{loc.loc_address}} "
                    readonly
                  />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <label for="state" class="col-sm-4 col-form-label">State</label>
                <div class="col-sm-8">
                  <input
                    type="text"
                    style="font-size: 20px"
                    name="state"
                    id="state"
                    class="form-control"
                    value="{{loc.state}}"
                    readonly
                  />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <label for="city" class="col-sm-4 col-form-label">City</label>
                <div class="col-sm-8">
                  <input
                    type="text"
                    style="font-size: 20px"
                    name="city"
                    id="city"
                    class="form-control"
                    value="{{loc.city}}"
                    readonly
                  />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <label for="pincode" class="col-sm-4 col-form-label"
                  >Pin Code</label
                >
                <div class="col-sm-8">
                  <input
                    type="text"
                    name="pincode"
                    style="font-size: 20px"
                    id="pincode"
                    class="form-control"
                    pattern="\d{6}"
                    maxlength="6"
                    value="{{loc.pincode}}"
                    readonly
                  />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <label for="price" class="col-sm-4 col-form-label"
                  >Price (per Hour)</label
                >
                <div class="col-sm-8">
                  <input
                    type="text"
                    style="font-size: 20px"
                    name="price"
                    id="price"
                    class="form-control"
                    step="0.01"
                    min="0"
                    value="{{lot.lot_price}}"
                  />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <label for="maxspot" class="col-sm-4 col-form-label"
                  >Maximum Spots</label
                >
                <div class="col-sm-8">
                  <input
                    type="text"
                    name="maxspot"
                    id="maxspot"
                    class="form-control"
                    min="1"
                    style="font-size: 20px"
                    value="{{lot.max_spot}}"
                  />
                </div>
              </div>

              <div class="text-center btn-container">
                <button type="submit" class="btn btn-dark " style="margin-reight:100px;">Save Change</button>
                <a href="{{ url_for('adash') }}" class="btn btn-danger" onclick="return confirm('Are you sure you want to cancel?');">Cancel</a>

              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
 
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
