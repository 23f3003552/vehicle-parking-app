<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />

    <!-- Your overrides -->
    <link rel="stylesheet"  href="{{ url_for('static', filename='css/adash.css') }}">
    

    <title>Add New Parking Lot</title>
  </head>
  <body>
  
    <!-- Header -->
    <nav class="nav navbar px-4 bg-dark">
      <a
        class="nav-link active text-white"
        aria-current="page"
        href="/editadmin"
        >Admin!</a
      >
      <a class="nav-link text-white" href="/admindashboard">Home</a>
      <a class="nav-link text-white" href="/viewuser">Users</a>
      <a class="nav-link text-white" href="/adminsummary">Summary</a>
      <a class="nav-link d-flex ms-auto text-white" href="/login">Logout</a>
    </nav>

    <!-- Form -->
    <div id="main">
      <div id="canvas">
        <div id="formBody" class="box">
           <h2 class="text-white m-0 text-center">Add New Parking Lot!</h2>
      
          <div class="container py-4">
            <form
              action="/addlot"
              method="post"
              class="mx-auto"
              style="max-width: 700px"
            >
              <div class="row mb-3 align-items-center">
                <label for="lot_name" class="col-sm-4 col-form-label"
                  >Prime Location</label
                >
                <div class="col-sm-8">
                  <input
                    type="text"
                    name="lot_name"
                    id="lot_name"
                    class="form-control"
                    required
                  />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <label for="address" class="col-sm-4 col-form-label"
                  >Address</label
                >
                <div class="col-sm-8">
                  <input
                    type="text"
                    name="address"
                    id="address"
                    class="form-control"
                    required
                  />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <label for="state" class="col-sm-4 col-form-label">State</label>
                <div class="col-sm-8">
                  <input
                    type="text"
                    name="state"
                    id="state"
                    class="form-control"
                    required
                  />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <label for="city" class="col-sm-4 col-form-label">City</label>
                <div class="col-sm-8">
                  <input
                    type="text"
                    name="city"
                    id="city"
                    class="form-control"
                    required
                  />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <label for="pincode" class="col-sm-4 col-form-label"
                  >Pin Code</label
                >
                <div class="col-sm-8">
                  <input
                    type="text"
                    name="pincode"
                    id="pincode"
                    class="form-control"
                    pattern="\d{6}"
                    maxlength="6"
                    required
                  />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <label for="price" class="col-sm-4 col-form-label"
                  >Price (per Hour)</label
                >
                <div class="col-sm-8">
                  <input
                    type="number"
                    name="price"
                    id="price"
                    class="form-control"
                    step="0.01"
                    min="0"
                    required
                  />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <label for="maxspot" class="col-sm-4 col-form-label"
                  >Maximum Spots</label
                >
                <div class="col-sm-8">
                  <input
                    type="number"
                    name="maxspot"
                    id="maxspot"
                    class="form-control"
                    min="1"
                    required
                  />
                </div>
              </div>

              <div class="text-center">
                <button type="submit" class="btn btn-dark">Add Lot</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
