<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <!-- internal css-->
     <link rel="stylesheet" href="{{ url_for('static', filename='css/adash.css') }}">
  
 <title>BOOK PARKING SPOT</title>
  </head>
  <body>
  <!-- Header -->
    <nav class="navbar navbar-dark tt bg-dark">
      <div class="container-fluid px-4"> <h3 class="text-white text-center m-0"> LotBuddy </h3> </div>
    </nav>
    <!-- Form for spot booking-->
    <div id="main">
      <div id="canvas">
        <div id="formBody" class="box">
          <h2 class="text-white m-0 text-center">Book Parking Spot!</h2>
          <div class="container py-4">
          {%if spot%} 
            <form
              action="{{ url_for('confirmbook',username=username) }}"
              method="post"
              class="mx-auto"
              style="max-width: 700px">
            
              <div class="row mb-3 align-items-center">
                <label for="lot_name" class="col-sm-4 col-form-label"
                  >SPOT ID</label >
                <div class="col-sm-8">
                  <input
                    type="text"
                    name="spotID"
                    id="lot_name"
                    class="form-control"
                    value="{{spot.spot_id}}"
                    readonly
                  />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <label for="address" class="col-sm-4 col-form-label"
                  >Lot ID</label>
                <div class="col-sm-8">
                  <input
                    type="text"
                    name="lotID"
                    id="address"
                    class="form-control"
                    value="{{spot.lot_id}}"
                    readonly />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <label for="price" class="col-sm-4 col-form-label"
                  >userName</label>
                <div class="col-sm-8">
                  <input
                    type="text"
                    name="username"
                    value="{{username}}"
                    class="form-control"
                     required
                     readonly
                  />
                </div>
              </div>

              <div class="row mb-3 align-items-center">
                <label for="maxspot" class="col-sm-4 col-form-label"
                  >Vehicle Number</label
                >
                <div class="col-sm-8">
                  <input
                    type="text"
                    name="vehno"
                    id="maxspot"
                    class="form-control"
                    required/>
                </div>
              </div>
              <div class="text-center"><br>
                <button type="submit"  class="btn btn-dark" onclick="this.disabled=true; this.form.submit();">Book Spot</button> 
                
                <a href="{{url_for('userdash',username=username)}}" class="btn btn-danger" onclick="return confirm('Are you sure you want to cancel booking?')">Cancel</a>

              </div>
            </form>
          {%else%}
            <div class="text-center"><h3 class="text-light">SORRY !! no spot available </h3>
                <a href="{{url_for('userdash',username=username)}}" class="btn btn-dark" >return</a>
             </div>
          {% endif %}
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
